<!DOCTYPE html>
<!-- This HTML document provides the student login page for the School Lost & Found website -->
<html lang="en">
<head>
    <!-- Meta tags for encoding, viewport, and title -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - School Lost & Found</title>

    <!-- Link to the student-specific stylesheet -->
    <link rel="stylesheet" href="student.css">
</head>
<body>

    <!-- Main content wrapper for the login page -->
    <main class="auth-wrapper" aria-label="Student login page">
        <!-- Login form container -->
        <div class="login-container">
            <h2>Student Login</h2>
            <!-- Form for student login with username and password fields -->
            <form id="studentLoginForm" aria-label="Student login form">
                <input type="text" id="username" placeholder="Username" required aria-label="Enter your username" tabindex="1">
                <input type="password" id="password" placeholder="Enter your password" required aria-label="Enter your password" tabindex="2">
                <button type="submit" aria-label="Log in to your account" tabindex="3">Login</button>
                <p class="error" id="errorMsg" aria-live="assertive"></p>
            </form>
        </div>
        <!-- Link to return to home page -->
        <a href="index.html" class="home-btn" aria-label="Go back to home page" tabindex="4">Home</a>
    </main>

    <!-- Scripts for Firebase initialization -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="firebase.js"></script>

    <!-- Scripts for student login functionality and keyboard navigation -->
    <script src="student.js"></script>
     <script src="keyboard-navigation.js"></script>

</body>
</html>
