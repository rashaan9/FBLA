    <!-- Claim Form -->
    <section class="section">
        <h2>Claim Item Form</h2>
        <form class="claim-form" action="#" method="POST">
            <div class="form-group">
                <label for="name">Your Name:</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label for="email">Your Email:</label>
                <input type="email" id="email" name="email" placeholder="example@email.com" required>
            </div>

            <div class="form-group">
                <label for="itemName">Item Name:</label>
                <input type="text" id="itemName" name="itemName" placeholder="Black Water Bottle" required>
            </div>

            <div class="form-group">
                <label for="itemDescription">Item Description:</label>
                <textarea id="itemDescription" name="itemDescription"
                    placeholder="Color, size, brand, distinguishing features..." rows="4" required></textarea>
            </div>

            <button type="submit" class="btn primary">Submit Report</button>
        </form>
    </section>
