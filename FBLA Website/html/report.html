<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Lost Item - School Lost & Found</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <!-- navigation -->
    <nav class="navbar" aria-label="Main navigation">
        <div class="logo">
            <img src="/images/schoolLogo.png" alt="School Lost and Found logo">
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="report.html">Report Item</a></li>
            <li><a href="browse.html">Browse Items</a></li>
            <li><a href="claim.html">Claim Item</a></li>
            <li><a href="student.html">Student Login</a></li>
            <li><a id="adminButton" href="admin.html">Admin Login</a></li>
        </ul>

        <!-- mobile menu button -->
         <div class="menu-toggle" role="button" tabindex="0" aria-label="Toggle navigation menu">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- main content -->
    <main id="mainContent">

        <!-- form section -->
        <section class="section" aria-label="Report lost item form">
            <h2>Lost Item Form</h2>

            <form class="lost-form" action="#" method="POST" aria-label="Form to report a lost item">

                <div class="form-group">
                    <label for="name">Your Name:</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Your Email:</label>
                    <input type="email" id="email" name="email" placeholder="example@email.com" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="phone" placeholder="123-456-7890" required>
                </div>

                <div class="form-group">
                    <label for="itemName">Item Name:</label>
                    <input type="text" id="itemName" name="itemName" placeholder="Black Water Bottle" required>
                </div>

                <div class="form-group">
                    <label for="itemDescription">Item Description:</label>
                    <textarea id="itemDescription" name="itemDescription"
                        placeholder="Color, size, brand, distinguishing features..." rows="4" required></textarea>
                </div>

                <div class="form-group">
                    <label for="lastSeen">Last Seen Location:</label>
                    <input type="text" id="lastSeen" name="lastSeen" placeholder="Cafeteria, Room 204..." required>
                </div>

                <div class="form-group">
                    <label for="dateLost">Date Lost:</label>
                    <input type="date" id="dateLost" name="dateLost" required>
                </div>

                <div class="form-group">
                    <label for="itemPhoto">Upload Photo (Optional):</label>
                    <input type="file" id="itemPhoto" name="itemPhoto" accept="image/*" aria-label="Upload a photo of the lost item">
                </div>

                <button type="submit" class="btn primary" aria-label="Submit lost item report">
                    Submit Report
                </button>

            </form>
        </section>

    </main>

    <!-- footer -->
    <footer aria-label="Footer information">
        <p class="footer1">© 2025 School Lost & Found. All Rights Reserved.</p>
        <p class="footer1">Cumberland Valley School District</p>
        <p class="footer1">6746 Carlisle Pike, Mechanicsburg, PA 17050</p>
        <a href="https://www.cvschools.org/">https://www.cvschools.org/</a>
    </footer>

    <!-- scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="/js/firebase.js"></script>
    <script src="/js/report.js"></script>
    <script src="/js/script.js"></script>
     <script src="/js/keyboard-navigation.js"></script>
    <script src="/js/nav.js"></script>
</body>
</html>
