<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Lost Items - School Lost & Found</title>

    <link rel="stylesheet" href="/css/style.css"> 
    <link rel="stylesheet" href="/css/browse.css"> 

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="/js/firebase.js"></script> 
</head>
<body>



    <!-- navigation -->
    <nav class="navbar" aria-label="Main navigation">
        <div class="logo">
            <img src="/images/schoolLogo.png" alt="School Lost and Found logo">
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="report.html">Report Item</a></li>
            <li><a href="browse.html">Browse Items</a></li>
            <li><a href="claim.html">Claim Item</a></li>
            <li><a href="student.html">Student Login</a></li>
            <li><a id="adminButton" href="admin.html">Admin Login</a></li>
        </ul>

        <!-- mobile menu button -->
         <div class="menu-toggle" role="button" tabindex="0" aria-label="Toggle navigation menu">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- main content -->
    <main id="mainContent" class="page-content">

        <h1 class="page-title">Browse Lost Items</h1>

        <!-- stats -->
        <div class="stats-bar" aria-label="Item statistics">
            <div class="stat">
                <h2 id="totalItems" aria-live="polite">0</h2>
                <p>Items Found</p>
            </div>
            <div class="stat">
                <h2 id="claimedItems" aria-live="polite">0</h2>
                <p>Items Claimed</p>
            </div>
            <div class="stat">
                <h2 id="newToday" aria-live="polite">0</h2>
                <p>New Today</p>
            </div>
        </div>

        <!-- search -->
        <input
            type="text"
            id="searchInput"
            class="search-bar"
            placeholder="Search items..."
            aria-label="Search lost items"
        >

        <!-- items list -->
        <div 
            class="item-grid" 
            id="itemsContainer" 
            aria-live="polite"
        ></div>

    </main>

    <script src="/js/browse.js"></script>
    <script src="/js/keyboard-navigation.js"></script>
    <script src="/js/script.js"></script>
    <script src="/js/nav.js"></script>
</body>
</html>
