<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - School Lost & Found</title>

    <!-- Stylesheet for admin login page -->
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <!-- Authentication wrapper -->
    <div class="auth-wrapper">

        <!-- Login form container -->
        <div class="login-container">
            <h2>Admin Login</h2>

            <!-- Admin login form -->
            <form id="adminLoginForm">
                <input type="text" id="username"  aria-label="Username" placeholder="Username" required>
                <input type="password" id="password"  aria-label="Password" placeholder="Password" required>
                <button type="submit"  aria-label="Submit">Login</button>

                <!-- Error message display -->
                <p class="error" id="errorMsg"></p>
            </form>
        </div>

        <!-- Home button -->
        <a href="index.html"  aria-label="Go back to home page" class="home-btn">Home</a>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

    <!-- Custom scripts -->
    <script src="firebase.js"></script> <!-- Firebase configuration -->
    <script src="admin.js"></script> <!-- Admin login logic -->
    <script src="keyboard-navigation.js"></script>
    <script src="nav.js"></script>
</body>
</html>
